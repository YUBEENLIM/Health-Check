name: Health Check CI  # 워크플로우 이름

on:
  push:
    branches: [ "main", "develop" ]  # main, develop에 push 시 실행
  pull_request:
    branches: [ "main", "develop" ]  # main, develop 대상 PR 시 실행
  workflow_dispatch:  # GitHub 화면에서 수동 실행 가능

permissions:  # test-reporter가 체크 런을 만들 수 있도록 권한 추가
  contents: read
  checks: write

jobs:
  test:
    runs-on: ubuntu-latest  # Ubuntu 러너 사용

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: JDK 17 설정
        uses: actions/setup-java@v4

        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: gradlew 실행 권한 부여
        run: chmod +x ./gradlew

      - name: Gradle 환경 확인
        run: ./gradlew --version  # CI에서 실제 Gradle/JDK 버전 확인용

      - name: 테스트 실행
        run: ./gradlew clean test --no-daemon  # clean 추가

      - name: JUnit Test Report 게시
        uses: dorny/test-reporter@v2  # v1 대신 현재 문서 예시의 v2 사용
        if: ${{ !cancelled() }}  # 취소되지 않았다면 항상 실행
        with:
          name: JUnit Tests
          path: build/test-results/test/*.xml
          reporter: java-junit